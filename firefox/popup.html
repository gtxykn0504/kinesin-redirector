<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinesin</title>
  <link rel="stylesheet" href="popup.css">
  <script src="common.js"></script>
</head>
<body>
  <div class="header">
    <h1>Kinesin</h1>
    <a href="/options.html" id="settingsLink" class="settings-icon" title="设置" aria-label="打开设置">⚙️</a>
  </div>

  <form id="addForm" class="add-form" aria-label="添加新的重定向规则">
    <div class="form-group">
      <label for="pattern">源 URL</label>
      <input id="pattern" type="text" placeholder="例如：bing.go" required aria-describedby="patternHelp">
    </div>
    <div class="form-group">
      <label for="target">目标 URL</label>
      <input id="target" type="text" placeholder="例如：www.bing.com" required aria-describedby="targetHelp">
    </div>
    <div class="form-group">
      <label for="groupSelect">分组</label>
      <select id="groupSelect" aria-describedby="groupSelectHelp">
        <option value="">自动分组</option>
      </select>
    </div>
    <button type="submit" class="add-btn">添加规则</button>
  </form>

  <div id="syncStatus" class="sync-status" role="status" aria-live="polite"></div>

  <script src="popup.js"></script>
</body>
</html>
