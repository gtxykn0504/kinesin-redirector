<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinesin 设置</title>
  <link rel="stylesheet" href="options.css">
  <script src="common.js"></script>
</head>
<body>
  <div id="status" class="status" role="status" aria-live="polite"></div>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Kinesin</h1>
      </div>
      <nav class="sidebar-nav" aria-label="主导航">
        <div class="nav-item active" data-page="rules" role="button" tabindex="0" aria-current="page">
          <span class="nav-icon" aria-hidden="true">📋</span>
          <span>规则列表</span>
        </div>
        <div class="nav-item" data-page="sync" role="button" tabindex="0">
          <span class="nav-icon" aria-hidden="true">🔄</span>
          <span>同步设置</span>
        </div>
        <a class="nav-item" href="https://docs.kegongteng.cn/kinesin/" target="_blank" rel="noopener noreferrer" role="link" tabindex="0">
          <span class="nav-icon" aria-hidden="true">📖</span>
          <span>文档</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div id="syncStatus" class="sync-indicator" role="status" aria-live="polite">
          <span class="sync-dot"></span>
          <span class="sync-text">就绪</span>
        </div>
        <div class="version-info">
          <span class="version">Version 1.4</span>
          <a href="https://kegongteng.cn" target="_blank" rel="noopener noreferrer" class="powered-by">Powered by Kegongteng</a>
        </div>
      </div>
    </div>

    <div class="main-content">
    <div class="content-header">
      <h2 id="pageTitle">规则列表</h2>
    </div>
    <div class="content-body">
      <div id="rulesPage" class="page active" role="tabpanel" aria-labelledby="pageTitle">
        <div class="add-rule-section">
          <form id="addRuleForm" class="add-rule-form">
            <div class="form-group">
              <label for="newFrom">源 URL</label>
              <input type="text" id="newFrom" placeholder="例如：go.zh" aria-describedby="newFromHelp">
              <span id="newFromHelp" class="help-text">要匹配的 URL 模式</span>
            </div>
            <div class="form-group">
              <label for="newTo">目标 URL</label>
              <input type="text" id="newTo" placeholder="例如：cn.bing.com" aria-describedby="newToHelp">
              <span id="newToHelp" class="help-text">重定向到的目标 URL</span>
            </div>
            <div class="form-group">
              <label for="newGroup">分组</label>
              <select id="newGroup" aria-describedby="newGroupHelp">
                <option value="">自动分组</option>
              </select>
              <span id="newGroupHelp" class="help-text">选择一个分组来管理规则</span>
            </div>
            <button type="button" id="addRuleBtn" class="add-btn">添加规则</button>
          </form>
        </div>

        <div class="section-title">
          <span>分组</span>
          <button class="add-group-btn" title="添加新分组" aria-label="添加新分组">➕</button>
        </div>
        <div id="groupsContainer" class="groups-container" role="list" aria-label="规则分组"></div>
      </div>

      <div id="syncPage" class="page" role="tabpanel" aria-labelledby="syncPageTitle">
        <div class="sync-settings">
          <div class="setting-item">
            <label for="serverUrl">服务器 URL</label>
            <input type="url" id="serverUrl" placeholder="https://api.example.com/redirect" aria-describedby="serverUrlHelp">
            <span id="serverUrlHelp" class="help-text">同步的服务器端点</span>
          </div>
          <div class="setting-item">
            <label for="apiKey">API 密钥</label>
            <input type="text" id="apiKey" placeholder="your-secret-key" aria-describedby="apiKeyHelp">
            <span id="apiKeyHelp" class="help-text">用于身份验证的 API 密钥</span>
          </div>
          <div class="setting-item">
            <label for="syncMode">同步模式</label>
            <select id="syncMode" aria-describedby="syncModeHelp">
              <option value="manual">禁用（仅手动同步）</option>
              <option value="startup">浏览器启动时</option>
              <option value="popup">打开弹出窗口时</option>
              <option value="both">启动 + 打开弹出窗口</option>
            </select>
            <span id="syncModeHelp" class="help-text">选择何时自动从服务器下载规则</span>
          </div>
          <div class="setting-actions">
            <button class="primary-btn" id="saveSettingsBtn">保存设置</button>
            <button class="secondary-btn" id="downloadBtn">手动同步</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="groupModal" class="group-edit-modal" role="dialog" aria-modal="true" aria-labelledby="groupModalTitle">
    <div class="modal-content">
      <h3 id="groupModalTitle">编辑分组</h3>
      <form id="groupForm">
        <div class="modal-field">
          <label for="groupName">分组名称</label>
          <input type="text" id="groupName" placeholder="分组名称" required>
        </div>
        <div class="auto-rules-section">
          <h4>自动分组规则</h4>
          <p>匹配这些条件的规则将自动添加到该分组。</p>
          <div id="autoRulesList" role="list" aria-label="自动分组条件"></div>
          <button type="button" class="add-auto-rule-btn" id="addAutoRuleBtn">+ 添加条件</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="cancel-btn" id="cancelGroupBtn">取消</button>
          <button type="submit" class="save-btn" id="saveGroupBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="editRuleModal" class="edit-rule-modal" role="dialog" aria-modal="true" aria-labelledby="editRuleModalTitle">
    <div class="modal-content">
      <h3 id="editRuleModalTitle">编辑规则</h3>
      <form id="editRuleForm">
        <div class="modal-field">
          <label for="editFrom">源 URL</label>
          <input type="text" id="editFrom" placeholder="源 URL" required>
        </div>
        <div class="modal-field">
          <label for="editTo">目标 URL</label>
          <input type="text" id="editTo" placeholder="目标 URL" required>
        </div>
        <div class="modal-field">
          <label for="editGroup">分组</label>
          <select id="editGroup" required></select>
        </div>
        <div class="modal-actions">
          <button type="button" class="cancel-btn" id="cancelEditRuleBtn">取消</button>
          <button type="submit" class="save-btn" id="saveEditRuleBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
