<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirector Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      color: #1e1e1e;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 24px;
    }
    h2 {
      font-size: 20px;
      font-weight: 500;
      margin: 0 0 8px 0;
      color: #2c3e50;
    }
    .description {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      border-bottom: 1px solid #eee;
      padding-bottom: 12px;
    }
    label {
      display: block;
      margin-top: 16px;
      font-weight: 500;
      font-size: 13px;
      color: #333;
    }
    input[type="url"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
      margin-top: 4px;
    }
    input[type="checkbox"] {
      margin-right: 8px;
      transform: scale(1.1);
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      margin-top: 18px;
      font-weight: normal;
    }
    button {
      padding: 8px 16px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      margin-top: 20px;
    }
    button:hover {
      background: #1e2b37;
    }
    hr {
      margin: 24px 0 16px;
      border: none;
      border-top: 1px solid #eee;
    }
    .status {
      margin-top: 16px;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 13px;
      background: #f0f0f0;
      color: #333;
    }
    .status:empty {
      display: none;
    }
    .status.success { background: #e8f5e8; color: #2e7d32; }
    .status.error { background: #ffebee; color: #b71c1c; }
    .manual-download {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .manual-download button {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Sync Settings</h2>
    <div class="description">Configure remote server and API key (sent via <code>X-API-Key</code> header).</div>

    <form id="configForm">
      <label class="checkbox-label">
        <input type="checkbox" id="enableSync"> Enable synchronization
      </label>

      <label>Server URL</label>
      <input type="url" id="serverUrl" placeholder="https://api.exp.com/redirect.php" required>

      <label>API Key</label>
      <input type="text" id="apiKey" placeholder="your-secret-key" required>

      <label class="checkbox-label">
        <input type="checkbox" id="autoDownload"> Auto-download rules on browser start & popup open
      </label>

      <button type="submit">Save Settings</button>
    </form>

    <hr>

    <div class="manual-download">
      <span>Manual sync:</span>
      <button id="downloadBtn">Download from Server</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
